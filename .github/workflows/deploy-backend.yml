name: Build and Push Node22 Container

on:
  push:
    branches: [ "main" ]

# Força o executor do GitHub a usar o Node.js 24 para as Actions
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # A v4 é compatível, mas o ambiente precisa do Node 24

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and Push Docker Image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/backend-node22:latest .
          docker push ghcr.io/${{ github.repository }}/backend-node22:latest