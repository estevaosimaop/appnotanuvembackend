name: Build and Push Node22 Container

on:
  push:
    branches: [ "main" ]

# Define variáveis de ambiente para o executor do GitHub
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # Checkout v4 ainda é funcional, mas a variável acima garante a compatibilidade
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and Push Docker Image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/backend-node22:latest .
          docker push ghcr.io/${{ github.repository }}/backend-node22:latest